<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrobPaint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<!-- Menu Bar -->
<div id="menubar">
  <div class="menu-item" data-menu="file">File</div>
  <div class="menu-item" data-menu="edit">Edit</div>
  <div class="menu-item" data-menu="image">Image</div>
  <div class="menu-item" data-menu="view">View</div>
</div>

<!-- Dropdown menus (hidden by default) -->
<div id="menu-dropdown" class="menu-dropdown hidden"></div>

<!-- Document Tabs -->
<div id="doc-tabs"></div>

<!-- Tool Options Bar -->
<div id="tool-options"></div>

<!-- Main Area -->
<div id="main">
  <!-- Toolbox -->
  <div id="toolbox">
    <button class="tool-btn active" data-tool="pencil" title="Pencil (P)">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </button>
    <button class="tool-btn" data-tool="brush" title="Brush (B)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
    </button>
    <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
      <svg viewBox="0 0 24 24"><path d="M16.24 3.56l4.95 4.94a1.5 1.5 0 010 2.12l-8.48 8.49a1.5 1.5 0 01-2.12 0L3.56 12.1a1.5 1.5 0 010-2.12l10.56-6.42a1.5 1.5 0 012.12 0zM4.27 11.4l7.07 7.07 3.54-3.54-7.07-7.07L4.27 11.4z"/></svg>
    </button>
    <button class="tool-btn" data-tool="fill" title="Fill (F)">
      <svg viewBox="0 0 24 24"><path d="M16.56 8.94L8.32.7a1 1 0 00-1.41 0L5.17 2.44 7.7 4.97 3.56 9.11a2 2 0 000 2.83l5.66 5.66a2 2 0 002.83 0l4.51-4.52a2 2 0 000-2.83zM5.41 10l4.24-4.24 4.24 4.24H5.41zM20 14.5c0 1.93-2 3.5-2 3.5s-2-1.57-2-3.5a2 2 0 014 0z"/></svg>
    </button>
    <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
      <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34a1 1 0 00-1.41 0l-3.12 3.12-1.41-1.42-1.42 1.42 1.42 1.41-7.65 7.65A2 2 0 004 16.66V20h3.34a2 2 0 001.41-.59l7.65-7.65 1.41 1.42 1.42-1.42-1.42-1.41 3.12-3.12a1 1 0 00.78-1.2z"/></svg>
    </button>
    <button class="tool-btn" data-tool="line" title="Line (L)">
      <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="tool-btn" data-tool="rectangle" title="Rectangle (R)">
      <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="tool-btn" data-tool="ellipse" title="Ellipse (O)">
      <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9" ry="6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
    <button class="tool-btn" data-tool="text" title="Text (T)">
      <svg viewBox="0 0 24 24"><text x="6" y="18" font-size="16" font-weight="bold" fill="currentColor">A</text></svg>
    </button>
    <button class="tool-btn" data-tool="select" title="Select (S)">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="3 2"/></svg>
    </button>
    <button class="tool-btn" data-tool="wand" title="Magic Wand (W)">
      <svg viewBox="0 0 24 24"><path d="M7.5 5.6L5 7l1.4-2.5L5 2l2.5 1.4L10 2 8.6 4.5 10 7 7.5 5.6zm12 9.8L22 14l-1.4 2.5L22 19l-2.5-1.4L17 19l1.4-2.5L17 14l2.5 1.4zM22 2l-2.5 1.4L17 2l1.4 2.5L17 7l2.5-1.4L22 7l-1.4-2.5L22 2zM3.5 21.5l10-10-2-2-10 10a1.41 1.41 0 002 2z"/></svg>
    </button>
    <button class="tool-btn" data-tool="move" title="Move Pixels (M)">
      <svg viewBox="0 0 24 24"><path d="M12 2l3 3h-2v4h4v-2l3 3-3 3v-2h-4v4h2l-3 3-3-3h2v-4H7v2l-3-3 3-3v2h4V5H9l3-3z"/></svg>
    </button>
  </div>

  <!-- Canvas Viewport -->
  <div id="viewport">
    <canvas id="canvas-bg"></canvas>
    <canvas id="canvas-main"></canvas>
    <canvas id="canvas-overlay"></canvas>
    <!-- Text editing overlay -->
    <div id="text-input-container" class="hidden">
      <textarea id="text-input"></textarea>
    </div>
  </div>

  <!-- Right Panel -->
  <div id="right-panel">
    <!-- Color Section -->
    <div id="color-section">
      <div id="color-swatches">
        <div id="swatch-secondary" title="Secondary color (right-click)"></div>
        <div id="swatch-primary" title="Primary color (left-click)"></div>
        <button id="swap-colors" title="Swap colors (X)">&#x21C4;</button>
      </div>
      <div id="alpha-row">
        <label>A:</label>
        <input type="range" id="alpha-slider" min="0" max="255" value="255">
        <span id="alpha-value">255</span>
      </div>
      <div id="palette-header">
        <select id="palette-select">
          <option value="lospec500">Lospec 500</option>
          <option value="pico8">PICO-8</option>
        </select>
      </div>
      <div id="palette"></div>
      <button id="toggle-hsv" class="panel-toggle">HSV Picker &#x25BC;</button>
      <div id="hsv-picker" class="hidden">
        <div id="sv-square">
          <div id="sv-cursor"></div>
        </div>
        <div id="hue-bar">
          <div id="hue-cursor"></div>
        </div>
        <div id="color-inputs">
          <div class="color-input-row">
            <label>H:</label><input type="number" id="input-h" min="0" max="360" value="0">
            <label>S:</label><input type="number" id="input-s" min="0" max="100" value="0">
            <label>V:</label><input type="number" id="input-v" min="0" max="100" value="0">
          </div>
          <div class="color-input-row">
            <label>R:</label><input type="number" id="input-r" min="0" max="255" value="0">
            <label>G:</label><input type="number" id="input-g" min="0" max="255" value="0">
            <label>B:</label><input type="number" id="input-b" min="0" max="255" value="0">
          </div>
          <div class="color-input-row">
            <label>Hex:</label><input type="text" id="input-hex" value="#000000" maxlength="7">
          </div>
        </div>
      </div>
    </div>

    <!-- Layers Section -->
    <div id="layers-section">
      <div id="layers-header">
        <span>Layers</span>
        <div id="layer-blend-controls">
          <select id="blend-mode">
            <option value="source-over">Normal</option>
            <option value="multiply">Multiply</option>
            <option value="screen">Screen</option>
            <option value="overlay">Overlay</option>
            <option value="darken">Darken</option>
            <option value="lighten">Lighten</option>
            <option value="color-dodge">Color Dodge</option>
            <option value="color-burn">Color Burn</option>
            <option value="hard-light">Hard Light</option>
            <option value="soft-light">Soft Light</option>
            <option value="difference">Difference</option>
            <option value="exclusion">Exclusion</option>
            <option value="hue">Hue</option>
            <option value="saturation">Saturation</option>
            <option value="color">Color</option>
            <option value="luminosity">Luminosity</option>
          </select>
        </div>
      </div>
      <div id="layer-opacity-row">
        <label>Opacity:</label>
        <input type="range" id="layer-opacity" min="0" max="100" value="100">
        <span id="layer-opacity-value">100%</span>
      </div>
      <div id="layer-list"></div>
      <div id="layer-buttons">
        <button id="btn-layer-add" title="Add layer">+</button>
        <button id="btn-layer-delete" title="Delete layer">&minus;</button>
        <button id="btn-layer-up" title="Move up">&#x25B2;</button>
        <button id="btn-layer-down" title="Move down">&#x25BC;</button>
        <button id="btn-layer-duplicate" title="Duplicate layer">&#x29C9;</button>
        <button id="btn-layer-merge" title="Merge down">&#x21A7;</button>
      </div>
    </div>
  </div>
</div>

<!-- Status Bar -->
<div id="statusbar">
  <span id="status-coords">0, 0</span>
  <span id="status-size">0 x 0</span>
  <span id="status-zoom"><input type="number" id="zoom-input" value="100" min="5" max="3200" title="Zoom %">%<input type="range" id="zoom-slider" min="0" max="100" value="50" title="Zoom"></span>
  <span id="status-tool">Pencil</span>
  <span class="status-spacer"></span>
  <span id="status-grid" class="status-grid">
    <label><input type="checkbox" id="grid-toggle"> Grid</label>
    <input type="number" id="grid-size-x" min="1" max="512" value="16" title="Grid width">
    <span>×</span>
    <input type="number" id="grid-size-y" min="1" max="512" value="16" title="Grid height">
  </span>
</div>

<!-- New Image Dialog -->
<div id="dialog-overlay" class="hidden">
  <div id="new-image-dialog" class="dialog">
    <h3>New Image</h3>
    <div class="dialog-body">
      <div class="dialog-row">
        <label>Preset:</label>
        <select id="new-preset">
          <option value="800,600">800 x 600</option>
          <option value="1024,768">1024 x 768</option>
          <option value="1280,720" selected>1280 x 720</option>
          <option value="1920,1080">1920 x 1080</option>
          <option value="2560,1440">2560 x 1440</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="dialog-row">
        <label>Width:</label>
        <input type="number" id="new-width" value="1280" min="1" max="8192">
        <label>Height:</label>
        <input type="number" id="new-height" value="720" min="1" max="8192">
      </div>
      <div class="dialog-row">
        <label>Background:</label>
        <select id="new-bg">
          <option value="white">White</option>
          <option value="black">Black</option>
          <option value="transparent">Transparent</option>
        </select>
      </div>
    </div>
    <div class="dialog-buttons">
      <button id="new-ok">Create</button>
      <button id="new-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Canvas Size Dialog -->
<div id="canvas-size-overlay" class="hidden">
  <div id="canvas-size-dialog" class="dialog">
    <h3>Canvas Size</h3>
    <div class="dialog-body">
      <div class="dialog-row">
        <label>Current:</label>
        <span id="cs-current">0 x 0</span>
      </div>
      <div class="dialog-row">
        <label>Width:</label>
        <input type="number" id="cs-width" value="0" min="1" max="8192">
        <label>Height:</label>
        <input type="number" id="cs-height" value="0" min="1" max="8192">
      </div>
      <div class="dialog-row">
        <label>Anchor:</label>
        <div id="cs-anchor-grid">
          <button data-anchor="tl"></button><button data-anchor="tc"></button><button data-anchor="tr"></button>
          <button data-anchor="ml"></button><button data-anchor="mc" class="active"></button><button data-anchor="mr"></button>
          <button data-anchor="bl"></button><button data-anchor="bc"></button><button data-anchor="br"></button>
        </div>
      </div>
    </div>
    <div class="dialog-buttons">
      <button id="cs-ok">Apply</button>
      <button id="cs-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Scale Image Dialog -->
<div id="scale-image-overlay" class="hidden">
  <div id="scale-image-dialog" class="dialog">
    <h3>Scale Image</h3>
    <div class="dialog-body">
      <div class="dialog-row">
        <label>Current:</label>
        <span id="si-current">0 x 0</span>
      </div>
      <div class="dialog-row">
        <label>Width:</label>
        <input type="number" id="si-width" value="0" min="1" max="16384">
        <label>Height:</label>
        <input type="number" id="si-height" value="0" min="1" max="16384">
      </div>
      <div class="dialog-row">
        <label></label>
        <label class="si-checkbox-label"><input type="checkbox" id="si-lock" checked> Maintain aspect ratio</label>
      </div>
      <div class="dialog-row">
        <label>Resample:</label>
        <select id="si-interpolation">
          <option value="nearest">Nearest Neighbor</option>
          <option value="bilinear" selected>Bilinear</option>
          <option value="bicubic">Bicubic</option>
        </select>
      </div>
    </div>
    <div class="dialog-buttons">
      <button id="si-ok">Apply</button>
      <button id="si-cancel">Cancel</button>
    </div>
  </div>
</div>

<script type="module" src="js/core.js"></script>
<script type="module" src="js/renderer.js"></script>
<script type="module" src="js/tools.js"></script>
<script type="module" src="js/ui.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
